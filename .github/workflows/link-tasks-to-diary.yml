name: "关联任务到日记中心"

on:
  schedule:
    # 每 3 小时执行一次，按北京时间对应为 00:00 / 03:00 / 06:00 / 09:00 / 12:00 / 15:00 / 18:00 / 21:00
    - cron: "0 1,4,7,10,13,16,19,22 * * *"
    # 每天晚上 11:50 强制补一次 (UTC 15:50 = 北京时间 23:50)
    - cron: "50 15 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "目标日期 (YYYY-MM-DD)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-tasks:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests -q

      - name: 关联任务到日记
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DIDA_TOKEN: ${{ secrets.DIDA_TOKEN }}
        run: |
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE=$(date +%Y-%m-%d)
          fi
          echo "📅 步骤2：关联任务到日记 — 日期: $TARGET_DATE (北京时间)"
          python3 link_tasks_to_diary.py "$TARGET_DATE" run
