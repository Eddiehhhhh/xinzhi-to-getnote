name: Sync Xiaohongshu Links

on:
  # 每 5 分钟定时检查
  schedule:
    - cron: '*/5 * * * *'
  # 手动触发
  workflow_dispatch:
  # 外部服务触发（如 cron-job.org）
  repository_dispatch:
    types: [sync]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        run: node sync.js
        env:
          XINZHI_TOKEN: ${{ secrets.XINZHI_TOKEN }}
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}

      - name: Commit processed IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_ids.json
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "chore: 更新已处理记录 $(date +%Y-%m-%d\ %H:%M:%S)"
            git push origin main
          fi

