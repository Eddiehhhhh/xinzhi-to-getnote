name: Sync Xiaohongshu Links

on:
  schedule:
    # 每 5 分钟执行一次
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        run: node sync.js
        env:
          XINZHI_TOKEN: ${{ secrets.XINZHI_TOKEN }}
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}

      - name: Commit processed IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_ids.json 2>/dev/null || true
          git diff --quiet && true || git commit -m "chore: 更新已处理记录 $(date +%Y-%m-%d\ %H:%M:%S)" && git push origin main || echo "无需提交"
