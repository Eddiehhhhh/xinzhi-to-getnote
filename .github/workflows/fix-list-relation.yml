name: "修复任务中心清单关联"

on:
  # 每天凌晨00:30执行（北京时间），扫描所有没有清单的任务
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:
    # 手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix-list-relation:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests -q

      - name: 修复清单关联
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DIDA_TOKEN: ${{ secrets.DIDA_TOKEN }}
        run: |
          echo "🔧 步骤1：修复任务中心清单关联"
          python3 fix_list_relation.py run
